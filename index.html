<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post SOSE News</title>

<style>
body{
background:black;
color:#00ff99;
font-family:Courier New;
text-align:center;
}

input,textarea{
width:90%;
margin:5px;
padding:8px;
background:black;
color:#00ff99;
border:1px solid #00ff99;
}

button{
padding:8px;
background:#00ff99;
color:black;
border:none;
}

a{color:#00ff99;}

#lockScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:#00ff99;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}
</style>
</head>

<body>

<div id="lockScreen">
<h2>🔐 Followers Only Access</h2>
<p>Enter Secret Code from Instagram Story</p>
<input type="password" id="secretCode" placeholder="Enter Code">
<button onclick="checkCode()">Enter</button>
</div>

<h1>💀Post Daily SOSE News💀</h1>

<input type="text" id="headline" placeholder="Headline">
<textarea id="description" placeholder="News"></textarea>

<input type="file" id="image">

<button onclick="publishNews()">Publish</button>

<br><br>
<a href="feed.html">👉 View All News</a>

<script>
function checkCode(){
let code=document.getElementById("secretCode").value;
if(code==="SOSE2026"){
document.getElementById("lockScreen").style.display="none";
}else{
alert("Wrong Code 😈");
}
}

function publishNews(){

let headline=document.getElementById("headline").value || "";
let description=document.getElementById("description").value || "";
let image=document.getElementById("image").files[0];

if(headline==="" && description==="" && !image){
alert("Kuch to likh de bhai 😭");
return;
}

let news={
headline:headline,
description:description,
image:""
};

if(image){
let reader=new FileReader();
reader.onload=function(){
news.image=reader.result;
saveNews(news);
}
reader.readAsDataURL(image);
}else{
saveNews(news);
}

}

function saveNews(news){
let allNews=JSON.parse(localStorage.getItem("soseNews")) || [];
allNews.push(news);
localStorage.setItem("soseNews",JSON.stringify(allNews));

alert("News Published 😎🔥");

document.getElementById("headline").value="";
document.getElementById("description").value="";
document.getElementById("image").value="";
}
</script>

</body>
</html>
